name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Biome lint + format check
        run: pnpm exec biome ci .

  build-tokens:
    name: Build tokens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build token pipeline
        run: pnpm --filter @ekko-ds/tokens build

      - name: Upload token artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tokens-dist
          path: packages/tokens/dist/
          retention-days: 7

  test-components:
    name: Test components (Chromium)
    needs: build-tokens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @ekko-ds/components exec playwright install --with-deps chromium

      - name: Download token artifacts
        uses: actions/download-artifact@v4
        with:
          name: tokens-dist
          path: packages/tokens/dist/

      - name: Run component tests
        run: pnpm --filter @ekko-ds/components test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: packages/components/coverage/
          retention-days: 7

  build-components:
    name: Build components
    needs: [build-tokens, test-components]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Download token artifacts
        uses: actions/download-artifact@v4
        with:
          name: tokens-dist
          path: packages/tokens/dist/

      - name: Build component library
        run: pnpm --filter @ekko-ds/components build

      - name: Upload component artifacts
        uses: actions/upload-artifact@v4
        with:
          name: components-dist
          path: packages/components/dist/
          retention-days: 7

  a11y:
    name: Accessibility scan
    needs: build-components
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Download token artifacts
        uses: actions/download-artifact@v4
        with:
          name: tokens-dist
          path: packages/tokens/dist/

      - name: Download component artifacts
        uses: actions/download-artifact@v4
        with:
          name: components-dist
          path: packages/components/dist/

      - name: Install Playwright browsers (a11y)
        run: pnpm --filter @ekko-ds/docs exec playwright install --with-deps chromium

      - name: Run accessibility tests
        run: pnpm --filter @ekko-ds/docs test:a11y

  release:
    name: Release
    needs: [lint, build-components, a11y]
    runs-on: ubuntu-latest
    if: github.repository == 'Mellow254/Ekko' && github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install npm 11.5.1+ to local prefix (required for OIDC trusted publishing)
        run: |
          npm install --prefix "$HOME/.npm-cli" npm@latest
          echo "$HOME/.npm-cli/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Verify npm version and OIDC env
        run: |
          npm --version
          which npm
          echo "GITHUB_ACTIONS=${GITHUB_ACTIONS:-not set}"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL=${ACTIONS_ID_TOKEN_REQUEST_URL:+set}${ACTIONS_ID_TOKEN_REQUEST_URL:-MISSING}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN=${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+set}${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-MISSING}"
          echo "NPM_CONFIG_USERCONFIG=${NPM_CONFIG_USERCONFIG:-not set}"
          if [ -n "${NPM_CONFIG_USERCONFIG:-}" ] && [ -f "$NPM_CONFIG_USERCONFIG" ]; then
            echo "--- userconfig contents ---"
            cat "$NPM_CONFIG_USERCONFIG"
            echo "--- end ---"
          fi

      - run: pnpm install --frozen-lockfile

      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          title: 'chore: release packages'
          commit: 'chore: release packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: '0'
